<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>图片生成视频</title>
    <link rel="stylesheet" href="/styles.css?v=6" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>图片生成视频</h1>
          <p id="statusText">连接中...</p>
        </div>
        <button id="statusButton" class="iconButton" title="刷新连接">↻</button>
      </header>

      <section class="urlbar" aria-label="ComfyUI 地址">
        <label for="comfyUrl">ComfyUI 地址</label>
        <input id="comfyUrl" type="url" placeholder="https://你的-comfyui-地址" />
        <button id="saveComfyUrl">连接</button>
      </section>

      <section class="simpleWorkspace">
        <section class="panel mainPanel">
          <div class="panelHeader">
            <h2>上传图片</h2>
            <span id="promptBadge">待生成</span>
          </div>

          <label class="fileDrop wide heroDrop">
            <input id="mediaFiles" type="file" accept="image/*" />
            <span id="mediaLabel">点击上传一张图片，然后生成视频</span>
          </label>
          <div id="uploads" class="uploads"></div>

          <div class="actions runbar">
            <button id="runButton" class="primary">生成视频</button>
          </div>
        </section>

        <aside class="panel">
          <div class="panelHeader">
            <h2>输出</h2>
            <span id="outputBadge">0</span>
          </div>
          <div id="log" class="log"></div>
          <div id="outputs" class="outputs"></div>
        </aside>
      </section>
    </main>

    <script src="/app.js?v=6" type="module"></script>
  </body>
</html>
